# Настройки сервера
server:
  port: 8081
  shutdown: graceful

# Настройки приложения
spring:
  application:
    name: currency-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    zookeeper:
      connect-string: ${ZOOKEEPER_URL:localhost:2181}
      discovery:
        enabled: true
        register: true
        instance-host: ${INSTANCE_HOST:localhost}
        instance-port: ${server.port}
        initial-status: UP
        instance-status: UP
      session-timeout-ms: 30000
      connection-timeout-ms: 5000
  lifecycle:
    timeout-per-shutdown-phase: 30s

# Настройки логирования
logging:
  level:
    com.example: INFO
    org.springframework.web: WARN
    org.apache.zookeeper: WARN
    org.springframework.cloud.zookeeper: DEBUG
    com.example.currencyprovider: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always