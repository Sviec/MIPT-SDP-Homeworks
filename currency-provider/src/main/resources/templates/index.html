<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange rate USD/RUB</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 90%;
        }

        .rate-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .currency-label {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }

        .rate-number {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            line-height: 1.2;
        }

        .change {
            font-size: 24px;
            margin-top: 10px;
        }

        .change.positive {
            color: #10b981;
        }

        .change.negative {
            color: #ef4444;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 30px;
        }

        .last-update {
            text-align: center;
            color: #999;
            margin-top: 20px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: transform 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align: center; color: #333;">Dollar exchange rate</h1>

    <div class="rate-container">
        <div class="currency-label">USD/RUB</div>
        <div class="rate-number" id="currentRate">--</div>
        <div class="change" id="rateChange">--</div>
    </div>

    <div class="chart-container">
        <canvas id="rateChart"></canvas>
    </div>

    <button onclick="refreshData()">Get update</button>

    <div class="last-update" id="lastUpdate">Downloading...</div>
</div>

<script>
    let chart;
    const maxDataPoints = 20;
    const timestamps = [];
    const rates = [];

    function initChart() {
        const ctx = document.getElementById('rateChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [{
                    label: 'Exchange rate USD/RUB',
                    data: rates,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    borderWidth: 3,
                    pointRadius: 5,
                    pointBackgroundColor: '#764ba2',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 1000
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        grid: {
                            color: 'rgba(0,0,0,0.05)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    }

    async function refreshData() {
        try {
            const response = await fetch('/api/currency/usd-rub');
            const data = await response.json();

            const rate = data.rate;
            document.getElementById('currentRate').textContent = rate.toFixed(2);

            const date = new Date(data.timestamp);
            document.getElementById('lastUpdate').textContent =
                `Last update: ${date.toLocaleTimeString()}`;

            const timeStr = date.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            timestamps.push(timeStr);
            rates.push(rate);

            if (timestamps.length > maxDataPoints) {
                timestamps.shift();
                rates.shift();
            }

            if (rates.length > 1) {
                const change = rates[rates.length - 1] - rates[rates.length - 2];
                const changeElement = document.getElementById('rateChange');
                changeElement.textContent = (change > 0 ? '+' : '') + change.toFixed(2);
                changeElement.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
            }

            chart.update();

        } catch (error) {
            console.error('Error while receiving data:', error);
            document.getElementById('currentRate').textContent = 'Ошибка';
        }
    }

    window.onload = () => {
        initChart();
        refreshData();
        setInterval(refreshData, 5000);
    };
</script>
</body>
</html>
