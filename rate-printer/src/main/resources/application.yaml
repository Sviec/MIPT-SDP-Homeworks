# Настройки сервера
server:
  port: 8082
  shutdown: graceful

# Настройки приложения
spring:
  application:
    name: rate-printer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    zookeeper:
      connect-string: ${ZOOKEEPER_URL:localhost:2181}
      discovery:
        enabled: true
        register: true
        instance-host: ${INSTANCE_HOST:localhost}
        instance-port: ${server.port}
        initial-status: UP
        instance-status: UP
      session-timeout-ms: 30000
      connection-timeout-ms: 5000
  lifecycle:
    timeout-per-shutdown-phase: 30s

currency:
  provider:
    url: ${PROVIDER_URL:http://localhost:8081}

# Настройки логирования
logging:
  level:
    com.example.rateprinter: DEBUG

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always