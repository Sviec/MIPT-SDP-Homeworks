version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always
    networks:
      - app-network

  currency-provider:
    build:
      context: ../../currency-provider
      dockerfile: Dockerfile
    container_name: currency-provider
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8081
      ZOOKEEPER_URL: zookeeper:2181
      INSTANCE_HOST: currency-provider
    depends_on:
      - zookeeper
    networks:
      - app-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  rate-printer:
    build:
      context: ../../rate-printer
      dockerfile: Dockerfile
    container_name: rate-printer
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8082
      PROVIDER_URL: http://currency-provider:8081
      ZOOKEEPER_URL: zookeeper:2181
      INSTANCE_HOST: rate-printer
    depends_on:
      - zookeeper
      - currency-provider
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - app-network

volumes:
  prometheus_data:

networks:
  app-network:
    driver: bridge